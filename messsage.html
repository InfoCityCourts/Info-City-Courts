<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickChat | Supabase Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #chat-box { height: 60vh; }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <div class="max-w-2xl mx-auto mt-10 shadow-xl rounded-lg overflow-hidden bg-white">
        <div class="bg-indigo-600 p-4">
            <h1 class="text-white text-xl font-bold text-center">Realtime Chat</h1>
        </div>

        <div id="chat-box" class="p-4 overflow-y-auto flex flex-col gap-3 bg-slate-50">
            </div>

        <div class="p-4 bg-white/50 border-t border-slate-200">
            <form id="message-form" class="flex flex-col gap-3">
                <div class="flex gap-2">
                    <input type="text" id="username" placeholder="Your Name" required 
                        class="w-1/3 px-4 py-2 bg-white rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm font-medium">
                    
                    <div class="flex-1 flex gap-2 relative">
                        <input type="text" id="message-input" placeholder="Type a message..." required 
                            class="w-full px-4 py-2 bg-white rounded-xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm">
                        <button type="submit" 
                            class="bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded-xl shadow-lg shadow-indigo-100 transition-all active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                            </svg>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 1. Initialize Supabase
        const SUPABASE_URL = 'https://okifxlsmlzeyrvvxyzdx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9raWZ4bHNtbHpleXJ2dnh5emR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODY1MjEsImV4cCI6MjA5MDI2MjUyMX0.IOlPcYju3wjLDryDq_62N8JsK6EFaxMFmNrvbTDTX_I';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const chatBox = document.getElementById('chat-box');
        const messageForm = document.getElementById('message-form');

        // 2. Function to render a single message bubble
        const appendMessage = (data) => {
            const div = document.createElement('div');
            div.className = "bg-white p-3 rounded-lg shadow-sm border border-slate-100 self-start max-w-[80%]";
            div.innerHTML = `
                <p class="text-xs font-bold text-indigo-600 mb-1">${data.sender_name}</p>
                <p class="text-slate-800">${data.content}</p>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
        };

        // 3. Fetch initial history
        async function fetchMessages() {
            const { data, error } = await supabase
                .from('Messages')
                .select('*')
                .order('created_at', { ascending: true });
            
            if (data) data.forEach(msg => appendMessage(msg));
        }

        // 4. Listen for Realtime inserts
        supabase
            .channel('public:Messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'Messages' }, payload => {
                appendMessage(payload.new);
            })
            .subscribe();

        // 5. Handle sending messages
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const sender_name = document.getElementById('username').value;
            const content = document.getElementById('message-input').value;

            const { error } = await supabase
                .from('Messages')
                .insert([{ sender_name, content }]);

            if (!error) {
                document.getElementById('message-input').value = '';
            } else {
                alert("Error sending message!");
            }
        });

        // Load messages on start
        fetchMessages();
    </script>
</body>
</html>
