<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#0b0b0f"/>
  <title>Infocity Court — My Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Round" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--font-primary:'Poppins',sans-serif;--accent:#ff6b35;--gold:#ffc300;--green:#22c55e;--red:#ef4444;--radius-md:16px;--nav-height:72px}
    [data-theme="dark"]{--bg-primary:#0b0b0f;--bg-card:#1a1a24;--bg-input:rgba(255,255,255,.05);--bg-nav:rgba(11,11,15,.85);--text-primary:#ffffff;--text-secondary:rgba(255,255,255,.7);--border:rgba(255,255,255,.08)}
    [data-theme="light"]{--bg-primary:#f8f8fc;--bg-card:#ffffff;--bg-input:rgba(0,0,0,.04);--bg-nav:rgba(255,255,255,.88);--text-primary:#1a1a2e;--text-secondary:rgba(26,26,46,.65);--border:rgba(0,0,0,.08)}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{font-size:16px;scroll-behavior:smooth}
    body{font-family:var(--font-primary);background:var(--bg-primary);color:var(--text-primary);min-height:100vh}
    a{text-decoration:none;color:inherit}button{font-family:var(--font-primary);cursor:pointer;border:none;background:none}
    .navbar{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:var(--bg-nav);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,4vw,48px)}
    .nav-brand{display:flex;align-items:center;gap:8px;font-size:1.15rem;font-weight:800;color:var(--accent)}
    .nav-right{display:flex;gap:12px}
    .nav-btn{display:flex;align-items:center;gap:6px;color:var(--text-secondary);font-weight:600;font-size:.85rem}
    .main{margin-top:var(--nav-height);padding:40px 20px;max-width:800px;margin-left:auto;margin-right:auto}
    .order-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:20px;padding:20px}
    .oc-header{display:flex;justify-content:space-between;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:12px}
    .status-chip{padding:4px 12px;border-radius:50px;font-size:.75rem;font-weight:700;text-transform:uppercase}
    .status-chip.pending{background:rgba(251,191,36,.2);color:#fbbf24}
    .status-chip.delivered{background:rgba(34,197,94,.2);color:var(--green)}
    .oc-item{display:flex;justify-content:space-between;margin-bottom:8px;font-size:.9rem}
    .oc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);font-weight:800}
    .btn-reorder{padding:8px 16px;background:var(--bg-input);border:1px solid var(--accent);color:var(--accent);border-radius:50px;font-weight:700}
    .mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:68px;background:var(--bg-nav);border-top:1px solid var(--border);z-index:1000;justify-content:space-around;align-items:center}
    .mob-nav-item{display:flex;flex-direction:column;align-items:center;color:var(--text-secondary);font-size:.7rem}
    .mob-nav-item.active{color:var(--accent)}
    @media(max-width:768px){.mobile-bottom-nav{display:flex}.main{padding-bottom:100px}.nav-btn{display:none}}
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-brand"><span class="material-icons">restaurant</span> Infocity Court</a>
  <div class="nav-right">
    <a href="index.html" class="nav-btn"><span class="material-icons">home</span>Home</a>
    <a href="cart.html" class="nav-btn"><span class="material-icons">shopping_cart</span>Cart</a>
    <a href="account.html" class="nav-btn"><span class="material-icons">person</span>Account</a>
  </div>
</nav>

<main class="main">
  <h1 style="margin-bottom:24px">My Orders</h1>
  <div id="ordersList">Loading...</div>
</main>

<div class="mobile-bottom-nav">
  <a href="index.html" class="mob-nav-item"><span class="material-icons">home</span>Home</a>
  <a href="cart.html" class="mob-nav-item"><span class="material-icons">shopping_cart</span>Cart</a>
  <a href="orders.html" class="mob-nav-item active"><span class="material-icons">receipt_long</span>Orders</a>
  <a href="account.html" class="mob-nav-item"><span class="material-icons">person</span>Account</a>
</div>

<script>
const SUPABASE_URL  = 'https://okifxlsmlzeyrvvxyzdx.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9raWZ4bHNtbHpleXJ2dnh5emR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODY1MjEsImV4cCI6MjA5MDI2MjUyMX0.IOlPcYju3wjLDryDq_62N8JsK6EFaxMFmNrvbTDTX_I';   // ← paste your anon/public key

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

(async function(){
  const uid=localStorage.getItem('infocity_uid');
  if(!uid){window.location.href='../authentication.html';return}
  try{
    const{data:orders}=await sb.from('orders').select('*').eq('user_id',uid).order('created_at',{ascending:false});
    const container=document.getElementById('ordersList');
    if(!orders||!orders.length){container.innerHTML='<p>No orders yet.</p>';return}
    
    // Fetch items manually
    const{data:items}=await sb.from('order_items').select('*').in('order_id',orders.map(o=>o.id));
    const allItems={};
    (items||[]).forEach(it=>{if(!allItems[it.order_id])allItems[it.order_id]=[];allItems[it.order_id].push(it)});

    container.innerHTML=orders.map(o=>`
      <div class="order-card">
        <div class="oc-header">
          <div><div style="font-weight:700">${o.seller_name}</div><div style="font-size:0.8rem;color:var(--text-secondary)">${new Date(o.created_at).toLocaleDateString()}</div></div>
          <div class="status-chip ${o.status}">${o.status}</div>
        </div>
        <div>${(allItems[o.id]||[]).map(it=>`<div class="oc-item"><span>${it.quantity}x ${it.food_name}</span><span>₹${it.unit_price}</span></div>`).join('')}</div>
        <div class="oc-footer">
          <div>Total: ₹${o.total}</div>
          <button class="btn-reorder" onclick="reorder('${o.id}')">Reorder</button>
        </div>
      </div>
    `).join('');
  }catch(e){document.getElementById('ordersList').innerHTML='Error loading orders.'}
})();

async function reorder(orderId){
  const{data:items}=await sb.from('order_items').select('*').eq('order_id',orderId);
  if(items){
    let cart=JSON.parse(localStorage.getItem('infocity_cart')||'[]');
    items.forEach(it=>{
      cart.push({id:it.food_id,food_name:it.food_name,seller_name:it.seller_name,price:it.unit_price,qty:it.quantity});
    });
    localStorage.setItem('infocity_cart',JSON.stringify(cart));
    window.location.href='cart.html';
  }
}
(function(){const s=localStorage.getItem('infocity_theme');if(s)document.documentElement.setAttribute('data-theme',s)})();
</script>
</body>
</html>
