<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#0b0b0f"/>
  <title>Infocity Court — My Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined|Material+Icons+Round" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--font-primary:'Poppins',sans-serif;--font-display:'Playfair Display',serif;--accent:#ff6b35;--accent-light:#ff8c5a;--accent-dark:#e8590c;--gold:#ffc300;--green:#22c55e;--red:#ef4444;--radius-sm:10px;--radius-md:16px;--radius-lg:24px;--radius-xl:32px;--nav-height:72px;--transition:.3s cubic-bezier(.4,0,.2,1)}
    [data-theme="dark"]{--bg-primary:#0b0b0f;--bg-secondary:#13131a;--bg-card:#1a1a24;--bg-card-hover:#22222e;--bg-input:rgba(255,255,255,.05);--bg-nav:rgba(11,11,15,.85);--text-primary:#ffffff;--text-secondary:rgba(255,255,255,.7);--text-tertiary:rgba(255,255,255,.4);--border:rgba(255,255,255,.08);--border-hover:rgba(255,255,255,.15);--card-shadow:0 4px 20px rgba(0,0,0,.3)}
    [data-theme="light"]{--bg-primary:#f8f8fc;--bg-secondary:#ffffff;--bg-card:#ffffff;--bg-card-hover:#f0f0f5;--bg-input:rgba(0,0,0,.04);--bg-nav:rgba(255,255,255,.88);--text-primary:#1a1a2e;--text-secondary:rgba(26,26,46,.65);--border:rgba(0,0,0,.08);--border-hover:rgba(0,0,0,.15);--card-shadow:0 4px 20px rgba(0,0,0,.06)}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{font-size:16px;scroll-behavior:smooth}
    body{font-family:var(--font-primary);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;transition:background .4s,color .4s}
    a{text-decoration:none;color:inherit}img{display:block;max-width:100%}button{font-family:var(--font-primary);cursor:pointer;border:none;background:none}input,textarea{font-family:var(--font-primary)}
    #pageLoader{position:fixed;inset:0;z-index:99999;background:var(--bg-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s}
    #pageLoader.hidden{opacity:0;pointer-events:none}
    .loader-ring{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .navbar{position:fixed;top:0;left:0;right:0;height:var(--nav-height);background:var(--bg-nav);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:1000;display:flex;align-items:center;padding:0 clamp(16px,4vw,48px)}
    .nav-left{display:flex;align-items:center;flex:1}
    .nav-brand{display:flex;align-items:center;gap:8px}
    .nav-brand .material-icons{font-size:30px;color:var(--accent)}
    .nav-brand span{font-size:1.15rem;font-weight:800;color:var(--accent)}
    .nav-right{display:flex;align-items:center;gap:6px}
    .nav-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);font-size:.82rem;font-weight:600;color:var(--text-secondary);transition:var(--transition)}
    .nav-btn:hover{background:var(--bg-input);color:var(--text-primary)}
    .theme-toggle{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--text-secondary)}
    .main{margin-top:var(--nav-height);padding:clamp(24px,4vw,48px) clamp(16px,4vw,60px);padding-bottom:100px;max-width:1100px;margin-left:auto;margin-right:auto}
    .page-header{margin-bottom:36px}
    .page-header h1{font-family:var(--font-display);font-size:2rem;font-weight:700}
    .cart-layout{display:grid;grid-template-columns:1fr 380px;gap:28px;align-items:start}
    .cart-item{display:flex;gap:18px;padding:20px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px}
    .ci-img{width:110px;height:110px;border-radius:var(--radius-md);overflow:hidden;flex-shrink:0}
    .ci-img img{width:100%;height:100%;object-fit:cover}
    .ci-body{flex:1;display:flex;flex-direction:column;justify-content:space-between}
    .ci-name{font-size:1rem;font-weight:700}
    .ci-price{font-size:1.1rem;font-weight:800;color:var(--accent)}
    .qty-control{display:flex;align-items:center;background:var(--bg-input);border:1px solid var(--border);border-radius:50px}
    .qty-control button{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--text-primary)}
    .qty-control .qty-num{width:36px;text-align:center;font-size:.9rem;font-weight:700}
    .summary-card{position:sticky;top:90px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px}
    .summary-row{display:flex;justify-content:space-between;padding:10px 0;font-size:.88rem}
    .summary-row.total{border-top:2px solid var(--border);font-size:1.1rem;font-weight:800}
    .coupon-row{display:flex;gap:8px;margin:18px 0}
    .coupon-row input{flex:1;padding:12px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary)}
    .coupon-row button{padding:12px 20px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--accent);font-weight:700}
    .btn-checkout{width:100%;padding:16px;background:var(--accent);color:#fff;font-weight:700;border-radius:var(--radius-md);margin-top:18px}
    .delivery-section{margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
    .del-form{display:flex;flex-direction:column;gap:10px}
    .del-form input,.del-form textarea{padding:12px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary)}
    .empty-state{text-align:center;padding:80px 20px}
    .empty-state .material-icons{font-size:80px;opacity:.5}
    .toast-container{position:fixed;top:84px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px}
    .toast{display:flex;align-items:center;gap:12px;padding:14px 20px;border-radius:var(--radius-md);font-size:.84rem;font-weight:500;backdrop-filter:blur(16px);animation:slideIn .4s forwards;background:var(--bg-card);border:1px solid var(--border)}
    @keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
    .mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:68px;background:var(--bg-nav);border-top:1px solid var(--border);z-index:1000;justify-content:space-around;align-items:center}
    .mob-nav-item{display:flex;flex-direction:column;align-items:center;color:var(--text-tertiary)}
    .mob-nav-item.active{color:var(--accent)}
    @media(max-width:900px){.cart-layout{grid-template-columns:1fr}.summary-card{position:static}}
    @media(max-width:768px){.mobile-bottom-nav{display:flex}.main{padding-bottom:100px}.nav-btn .btn-label{display:none}}
  </style>
</head>
<body>

<div id="pageLoader"><div class="loader-ring"></div></div>
<div class="toast-container" id="toastContainer"></div>

<nav class="navbar">
  <div class="nav-left"><a href="index.html" class="nav-brand"><span class="material-icons">restaurant</span><span>Infocity Court</span></a></div>
  <div class="nav-right">
    <button class="theme-toggle" onclick="toggleTheme()"><span class="material-icons" id="themeIcon">dark_mode</span></button>
    <a href="index.html" class="nav-btn"><span class="material-icons">home</span><span class="btn-label">Home</span></a>
    <a href="orders.html" class="nav-btn"><span class="material-icons">receipt_long</span><span class="btn-label">Orders</span></a>
    <a href="account.html" class="nav-btn"><span class="material-icons">person</span><span class="btn-label">Account</span></a>
  </div>
</nav>

<main class="main">
  <div class="page-header"><h1>Your Cart</h1></div>
  
  <div class="empty-state" id="emptyState" style="display:none">
    <span class="material-icons">remove_shopping_cart</span>
    <h2>Cart is empty</h2>
    <br><a href="index.html" style="padding:12px 24px;background:var(--accent);color:#fff;border-radius:10px;font-weight:bold">Browse Menu</a>
  </div>

  <div class="cart-layout" id="cartLayout">
    <div id="cartItems"></div>
    <div class="summary-card">
      <h3>Order Summary</h3>
      <div class="coupon-row"><input type="text" id="couponInput" placeholder="Coupon code"/><button onclick="applyCoupon()">Apply</button></div>
      <div class="summary-row"><span>Subtotal</span><span id="sumSubtotal">₹0</span></div>
      <div class="summary-row" id="discountRow" style="display:none;color:var(--green)"><span>Discount</span><span id="sumDiscount">-₹0</span></div>
      <div class="summary-row"><span>Delivery</span><span id="sumDelivery">₹40</span></div>
      <div class="summary-row"><span>Tax (5%)</span><span id="sumTax">₹0</span></div>
      <div class="summary-row total"><span>Total</span><span id="sumTotal">₹0</span></div>
      <div class="delivery-section">
        <h4>Delivery Details</h4>
        <div class="del-form">
          <input type="text" id="delAddress" placeholder="Full address"/>
          <input type="text" id="delCity" placeholder="City"/>
          <input type="text" id="delPincode" placeholder="Pincode"/>
        </div>
      </div>
      <button class="btn-checkout" onclick="placeOrder()">Place Order</button>
    </div>
  </div>
</main>

<div class="mobile-bottom-nav">
  <a href="index.html" class="mob-nav-item"><span class="material-icons">home</span>Home</a>
  <a href="cart.html" class="mob-nav-item active"><span class="material-icons">shopping_cart</span>Cart</a>
  <a href="orders.html" class="mob-nav-item"><span class="material-icons">receipt_long</span>Orders</a>
  <a href="account.html" class="mob-nav-item"><span class="material-icons">person</span>Account</a>
</div>

<script>
const SUPABASE_URL  = 'https://okifxlsmlzeyrvvxyzdx.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9raWZ4bHNtbHpleXJ2dnh5emR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODY1MjEsImV4cCI6MjA5MDI2MjUyMX0.IOlPcYju3wjLDryDq_62N8JsK6EFaxMFmNrvbTDTX_I';   // ← paste your anon/public key

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let currentUser=null; let cart=JSON.parse(localStorage.getItem('infocity_cart')||'[]'); let appliedCoupon=null;

(async function(){
  const uid=localStorage.getItem('infocity_uid');
  if(!uid){window.location.href='../authentication.html';return}
  try{
    const{data}=await sb.from('Users').select('*').eq('id',uid).maybeSingle();
    if(!data){localStorage.clear();window.location.href='../authentication.html';return}
    currentUser=data;
  }catch(e){}
  renderCart(); document.getElementById('pageLoader').classList.add('hidden');
})();

function renderCart(){
  const container=document.getElementById('cartItems'); const empty=document.getElementById('emptyState'); const layout=document.getElementById('cartLayout');
  if(!cart.length){empty.style.display='block';layout.style.display='none';return}
  empty.style.display='none';layout.style.display='grid';
  container.innerHTML=cart.map((item,i)=>`<div class="cart-item"><div class="ci-img"><img src="${item.image}"/></div><div class="ci-body"><div><div class="ci-name">${item.food_name}</div><div style="color:var(--text-tertiary);font-size:0.8rem">${item.seller_name}</div></div><div style="display:flex;justify-content:space-between;align-items:end"><div class="ci-price">₹${(item.price*item.qty).toFixed(2)}</div><div class="qty-control"><button onclick="changeQty(${i},-1)"><span class="material-icons">remove</span></button><span class="qty-num">${item.qty}</span><button onclick="changeQty(${i},1)"><span class="material-icons">add</span></button></div></div></div></div>`).join('');
  calculateSummary();
}
function changeQty(idx,delta){cart[idx].qty+=delta; if(cart[idx].qty<=0)cart.splice(idx,1); localStorage.setItem('infocity_cart',JSON.stringify(cart)); renderCart();}
function calculateSummary(){
  const subtotal=cart.reduce((s,c)=>s+(c.price*c.qty),0);
  let discount=0; if(appliedCoupon) discount=appliedCoupon.type==='percent'?subtotal*(appliedCoupon.value/100):appliedCoupon.value;
  const delivery=subtotal>=500?0:40; const tax=(subtotal-discount)*0.05; const total=Math.max(subtotal-discount+delivery+tax,0);
  document.getElementById('sumSubtotal').textContent='₹'+subtotal.toFixed(2);
  document.getElementById('sumDelivery').textContent=delivery===0?'FREE':'₹'+delivery.toFixed(2);
  document.getElementById('sumTax').textContent='₹'+tax.toFixed(2);
  document.getElementById('sumTotal').textContent='₹'+total.toFixed(2);
  if(appliedCoupon){document.getElementById('discountRow').style.display='flex';document.getElementById('sumDiscount').textContent='-₹'+discount.toFixed(2)}
}
function applyCoupon(){
  const code=document.getElementById('couponInput').value.trim().toUpperCase();
  const c={'INFOCITY40':{type:'percent',value:40},'FLAT100':{type:'flat',value:100}};
  if(c[code]){appliedCoupon=c[code];appliedCoupon.code=code;calculateSummary();toast('Coupon applied!','success')}else toast('Invalid coupon','error');
}
async function placeOrder(){
  if(!cart.length)return;
  const addr=document.getElementById('delAddress').value.trim(); const city=document.getElementById('delCity').value.trim(); const pin=document.getElementById('delPincode').value.trim();
  if(!addr||!city||!pin){toast('Fill delivery details','error');return}
  const subtotal=cart.reduce((s,c)=>s+(c.price*c.qty),0); let discount=appliedCoupon?(appliedCoupon.type==='percent'?subtotal*(appliedCoupon.value/100):appliedCoupon.value):0;
  const delivery_fee=subtotal>=500?0:40; const tax=(subtotal-discount)*0.05; const total=Math.max(subtotal-discount+delivery_fee+tax,0);
  try{
    const{data:order,error}=await sb.from('orders').insert({user_id:currentUser.id,user_name:currentUser.name,seller_name:cart[0].seller_name||'Restaurant',status:'pending',subtotal,delivery_fee,tax,discount,total,delivery_address:addr,delivery_city:city,delivery_pincode:pin}).select('id').single();
    if(error)throw error;
    const items=cart.map(c=>({order_id:order.id,food_id:c.id,food_name:c.food_name,seller_name:c.seller_name,unit_price:c.price,quantity:c.qty}));
    await sb.from('order_items').insert(items);
    localStorage.removeItem('infocity_cart');
    toast('Order placed!','success');
    setTimeout(()=>window.location.href='orders.html',1000);
  }catch(e){toast('Failed to place order','error')}
}
function toggleTheme(){const h=document.documentElement;const c=h.getAttribute('data-theme');const n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('infocity_theme',n);}
(function(){const s=localStorage.getItem('infocity_theme');if(s)document.documentElement.setAttribute('data-theme',s)})();
function toast(msg,type='info'){const b=document.createElement('div');b.className='toast '+type;b.innerHTML=`<span>${msg}</span>`;document.getElementById('toastContainer').appendChild(b);setTimeout(()=>b.remove(),3000)}
</script>
</body>
</html>
