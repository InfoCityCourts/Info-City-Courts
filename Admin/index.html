<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INFOTech Admin Panel PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* GLOBAL */
body {
  margin:0;
  font-family:'Outfit',sans-serif;
  background:#0b0b15;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#111122;
  height:100vh;
  overflow:auto;
  border-right:1px solid #222;
}

.logo {
  padding:20px;
  font-size:22px;
  color:#ff5a00;
}

.menu-item {
  padding:14px 20px;
  cursor:pointer;
  transition:0.2s;
}

.menu-item:hover { background:#1a1a2a; }

.menu-item.active {
  background:#ff5a00;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
  overflow:auto;
}

/* CARD */
.card {
  background:#141426;
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
}

/* FLEX */
.row {
  display:flex;
  gap:20px;
}

.col {
  flex:1;
}

/* BUTTON */
button {
  padding:10px 15px;
  background:#ff5a00;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* TABLE */
table {
  width:100%;
}

td {
  padding:10px;
  border-bottom:1px solid #333;
}

/* INPUT */
input, select {
  padding:10px;
  background:#1e1e2e;
  border:none;
  color:white;
  border-radius:8px;
}

/* ANALYTICS */
.chart {
  height:200px;
  background:#1a1a2e;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">INFOTech</div>

  <div class="menu-item active" onclick="openTab('dashboard',this)">Dashboard</div>
  <div class="menu-item" onclick="openTab('menu',this)">Menu</div>
  <div class="menu-item" onclick="openTab('orders',this)">Orders</div>
  <div class="menu-item" onclick="openTab('customers',this)">Customers</div>
  <div class="menu-item" onclick="openTab('tables',this)">Tables</div>
  <div class="menu-item" onclick="openTab('staff',this)">Staff</div>
  <div class="menu-item" onclick="openTab('inventory',this)">Inventory</div>
  <div class="menu-item" onclick="openTab('analytics',this)">Analytics</div>
  <div class="menu-item" onclick="openTab('settings',this)">Settings</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="card">
  <h2>Business Overview</h2>

  <div class="row">
    <div class="col card">
      <h3>Orders</h3>
      <p id="totalOrders">0</p>
    </div>

    <div class="col card">
      <h3>Revenue</h3>
      <p id="totalRevenue">₹0</p>
    </div>

    <div class="col card">
      <h3>Customers</h3>
      <p id="totalCustomers">0</p>
    </div>
  </div>

  <div class="card">
    <h3>Sales Graph</h3>
    <div class="chart"></div>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="card" style="display:none;">
  <h2>Menu Management</h2>

  <input id="name" placeholder="Food Name">
  <input id="price" placeholder="Price">
  <input id="category" placeholder="Category">

  <button onclick="addFood()">Add</button>

  <table id="menuTable"></table>
</div>

<!-- ORDERS -->
<div id="orders" class="card" style="display:none;">
  <h2>Orders</h2>
  <table id="ordersTable"></table>
</div>

<!-- CUSTOMERS -->
<div id="customers" class="card" style="display:none;">
  <h2>Customers</h2>
  <table id="customersTable"></table>
</div>

<!-- TABLES -->
<div id="tables" class="card" style="display:none;">
  <h2>Table Management</h2>
  <button onclick="addTable()">Add Table</button>
  <div id="tableGrid"></div>
</div>

<!-- STAFF -->
<div id="staff" class="card" style="display:none;">
  <h2>Staff</h2>
  <button onclick="addStaff()">Add Staff</button>
  <table id="staffTable"></table>
</div>

<!-- INVENTORY -->
<div id="inventory" class="card" style="display:none;">
  <h2>Inventory</h2>
  <button onclick="addStock()">Add Stock</button>
  <table id="inventoryTable"></table>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="card" style="display:none;">
  <h2>Analytics</h2>

  <div class="row">
    <div class="col card">
      <h3>Top Item</h3>
      <p id="topItem">-</p>
    </div>

    <div class="col card">
      <h3>Avg Order</h3>
      <p id="avgOrder">0</p>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="card" style="display:none;">
  <h2>Settings</h2>
  <button onclick="logout()">Logout</button>
</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://okifxlsmlzeyrvvxyzdx.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9raWZ4bHNtbHpleXJ2dnh5emR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODY1MjEsImV4cCI6MjA5MDI2MjUyMX0.IOlPcYju3wjLDryDq_62N8JsK6EFaxMFmNrvbTDTX_I"
);

/* TAB SWITCH */
function openTab(id, el){
  document.querySelectorAll(".card").forEach(c=>c.style.display="none");
  document.getElementById(id).style.display="block";

  document.querySelectorAll(".menu-item").forEach(m=>m.classList.remove("active"));
  el.classList.add("active");
}

/* INIT */
async function init(){
  loadDashboard();
  loadMenu();
  loadOrders();
}

init();
/* MENU */
async function loadMenu(){
  const { data } = await supabase.from("foods").select("*");

  let html="";
  data.forEach(f=>{
    html += `
      <tr>
        <td>${f.name}</td>
        <td>₹${f.price}</td>
        <td>
          <button onclick="deleteFood('${f.id}')">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("menuTable").innerHTML = html;
}

async function addFood(){
  await supabase.from("foods").insert([{
    name: name.value,
    price: price.value,
    category: category.value
  }]);

  loadMenu();
}

async function deleteFood(id){
  await supabase.from("foods").delete().eq("id", id);
  loadMenu();
}

/* ORDERS */
async function loadOrders(){
  const { data } = await supabase.from("orders").select("*");

  let html="";
  data.forEach(o=>{
    html+=`
      <tr>
        <td>${o.id}</td>
        <td>${o.status}</td>
        <td>
          <button onclick="updateOrder('${o.id}','done')">Done</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("ordersTable").innerHTML = html;
}

async function updateOrder(id,status){
  await supabase.from("orders").update({status}).eq("id", id);
  loadOrders();
}

/* DASHBOARD */
async function loadDashboard(){
  const { data } = await supabase.from("orders").select("*");

  let total = 0;

  data.forEach(o=>{
    total += o.total || 0;
  });

  document.getElementById("totalOrders").innerText = data.length;
  document.getElementById("totalRevenue").innerText = "₹"+total;
}

/* ANALYTICS */
async function loadAnalytics(){
  const { data } = await supabase.from("orders").select("*");

  let total = 0;
  let map = {};

  data.forEach(o=>{
    total += o.total || 0;

    if(o.items){
      o.items.forEach(i=>{
        map[i.name] = (map[i.name] || 0) + i.qty;
      });
    }
  });

  let top = Object.keys(map).reduce((a,b)=>map[a]>map[b]?a:b,"-");

  document.getElementById("topItem").innerText = top;
  document.getElementById("avgOrder").innerText = total/data.length;
}

/* TABLES */
function addTable(){
  alert("Table added (connect DB)");
}

/* STAFF */
function addStaff(){
  alert("Staff added");
}

/* INVENTORY */
function addStock(){
  alert("Stock added");
}

/* LOGOUT */
function logout(){
  alert("Logged out");
}

/* AUTO REFRESH */
setInterval(()=>{
  loadDashboard();
  loadOrders();
  loadMenu();
  loadAnalytics();
},3000);

</script>

</body>
</html>
