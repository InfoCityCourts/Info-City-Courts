<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFO CITY COURTS - Choose Your Role</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header style="background: #000000; color: rgb(244, 233, 242); padding: 20px 0;">
        <div class="container" style="text-align: center;">
            <h1>INFO CITY COURTS</h1>
            <p>Choose your role to get started</p>
        </div>
    </header>

    <section class="choice-container">
        <div class="choice-card">
            <i class="fas fa-user"></i>
            <h3>Customer</h3>
            <p>Order delicious food online from our restaurants</p>
            <button class="btn-choice" onclick="window.location.href='register_customer.html'">Register as Customer</button>
        </div>
        <div class="choice-card">
            <i class="fas fa-utensils"></i>
            <h3>Restaurant</h3>
            <p>Manage your restaurant and handle orders</p>
            <button class="btn-choice" onclick="window.location.href='register_restaurant.html'">Register as Restaurant</button>
        </div>
        <div class="choice-card">
            <i class="fas fa-building"></i>
            <h3>Food Courts</h3>
            <p>Oversee food court operations near your home</p>
            <button class="btn-choice" onclick="window.location.href='register_foodcourt.html'">Register as Food Court</button>
        </div>
    </section>

    <footer style="background: #333; color: white; text-align: center; padding: 20px 0; position: fixed; bottom: 0; width: 100%;">
        <p>&copy; 2026 INFO CITY COURTS. All rights reserved.</p>
    </footer>
</body>
</html>
